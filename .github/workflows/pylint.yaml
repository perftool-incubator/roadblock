name: pylint

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/pylint
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      only-docs: ${{ steps.filter.outputs.only_changed }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: tj-actions/changed-files@v47
        with:
          files: |
            LICENSE
            *.md
            **/*.md
            .github/rulesets/**
            .github/workflows/run-crucible-tracking.yaml
            .github/workflows/crucible-merged.yaml
            .github/workflows/crucible-ci.yaml
            .github/workflows/controller-build.yaml
            .github/workflows/roadblock-ci.yaml
            .github/workflows/pylint.yaml
            docs/**
      - name: Display changes
        run: echo '${{ toJSON(steps.filter.outputs) }}' | jq .

  pylint:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install redis
        pip install jsonschema
    - name: Analysing the code with pylint
      run: |
        python_files=$(find . -name "*.py")
        echo "Python files: ${python_files}"
        ./utilities/run-pylint.sh ${python_files}

  faux-pylint:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.only-docs == 'true' }}
    steps:
      - run: echo "faux-pylint-complete"

  pylint-complete:
    runs-on: ubuntu-latest
    needs: [ pylint, faux-pylint ]
    if: always()
    steps:
      - name: Check Results
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "pylint-complete"
